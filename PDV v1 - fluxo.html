<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxo PDV</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow: hidden; background: #ffffff; font-family: 'Inter', sans-serif; }
  body { display: flex; align-items: center; justify-content: center; }

  @media (prefers-color-scheme: dark) {
    html, body { background: #1a1a18; }
    .label { color: #e8e6dc !important; }
    .badge { background: #083320 !important; color: #5DCAA5 !important; border-color: #0F6E56 !important; }
  }

  .wrapper {
    width: 100%;
    padding: 1.25rem 1rem 1rem;
  }

  .flow {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(4px, 1vw, 8px);
    flex: 1;
    min-width: 0;
  }

  .circle {
    width: clamp(36px, 7vw, 60px);
    height: clamp(36px, 7vw, 60px);
    border-radius: 50%;
    background: #F5A623;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 12px rgba(245,166,35,0.35);
    flex-shrink: 0;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.35s ease, transform 0.35s ease, box-shadow 0.35s ease;
  }
  .circle.visible { opacity: 1; transform: translateY(0); }
  .circle.active  { box-shadow: 0 0 0 3px rgba(245,166,35,0.4), 0 3px 16px rgba(245,166,35,0.5); }
  .circle svg {
    width: clamp(14px, 3vw, 24px);
    height: clamp(14px, 3vw, 24px);
  }

  .label {
    font-size: clamp(8px, 1.1vw, 11px);
    font-weight: 600;
    color: #2c2c2a;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.35s ease;
    text-align: center;
  }
  .label.visible { opacity: 1; }

  .badge {
    font-size: clamp(8px, 1vw, 10px);
    font-weight: 500;
    color: #0F6E56;
    background: #E1F5EE;
    border: 0.5px solid #9FE1CB;
    border-radius: 20px;
    padding: clamp(2px, 0.3vw, 3px) clamp(6px, 1vw, 10px);
    white-space: nowrap;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .badge.active { opacity: 1; transform: translateY(0); }

  .connector {
    flex-shrink: 0;
    margin-bottom: clamp(28px, 5vw, 44px);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .connector.visible { opacity: 1; }

  .line {
    width: clamp(10px, 2.5vw, 32px);
    height: 3px;
    background: linear-gradient(90deg, #c8860a, #8B5E00);
    position: relative;
  }
  .line.arrow::after {
    content: '';
    position: absolute;
    right: -1px;
    top: 50%;
    transform: translateY(-50%);
    border-left: 7px solid #8B5E00;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="flow" id="flow"></div>
</div>

<script>
const steps = [
  {
    label: '/api_inicio',
    desc:  'PIN enviado ao consumidor',
    icon: `<svg viewBox="0 0 24 24" fill="white"><polygon points="6,3 20,12 6,21"/></svg>`
  },
  {
    label: '/api_validar_pin',
    desc:  'Cliente confirmado',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4,12 9,17 20,6"/></svg>`
  },
  {
    label: '/api_bonus_disponivel',
    desc:  'Saldo disponível consultado',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="8" r="4"/>
      <text x="12" y="10.5" text-anchor="middle" font-size="6" fill="white" stroke="none" font-weight="bold" font-family="Inter,sans-serif">$</text>
      <path d="M4 20c0-3.3 3.6-6 8-6s8 2.7 8 6"/>
    </svg>`
  },
  {
    label: '/api_campanha_disponivel',
    desc:  'Elegível para ganhar bônus',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>`
  },
  {
    label: '/api_finaliza_compra',
    desc:  'Bônus gerado e resgatado',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="21" r="1.5"/>
      <circle cx="19" cy="21" r="1.5"/>
      <path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/>
    </svg>`
  },
  {
    label: '/api_vendas_totais',
    desc:  'Venda contabilizada',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="20" x2="18" y2="10"/>
      <line x1="12" y1="20" x2="12" y2="4"/>
      <line x1="6"  y1="20" x2="6"  y2="14"/>
      <line x1="3"  y1="20" x2="21" y2="20"/>
    </svg>`
  }
];

const flow = document.getElementById('flow');
const circleEls = [], labelEls = [], badgeEls = [], lineEls = [];

steps.forEach((s, i) => {
  const slot = document.createElement('div');
  slot.className = 'slot';

  const circ = document.createElement('div');
  circ.className = 'circle';
  circ.innerHTML = s.icon;

  const lbl = document.createElement('div');
  lbl.className = 'label';
  lbl.textContent = s.label;

  const badge = document.createElement('div');
  badge.className = 'badge';
  badge.textContent = s.desc;

  slot.appendChild(circ);
  slot.appendChild(lbl);
  slot.appendChild(badge);
  flow.appendChild(slot);

  circleEls.push(circ);
  labelEls.push(lbl);
  badgeEls.push(badge);

  if (i < steps.length - 1) {
    const conn = document.createElement('div');
    conn.className = 'connector';
    const isLast = i === steps.length - 2;
    conn.innerHTML = `<div class="line${isLast ? ' arrow' : ''}"></div>`;
    flow.appendChild(conn);
    lineEls.push(conn);
  }
});

const sequence = [];
steps.forEach((_, i) => {
  sequence.push({ type: 'step', idx: i });
  if (i < steps.length - 1) sequence.push({ type: 'line', idx: i });
});

let current = 0;
const STEP_DELAY = 650;
const HOLD_TIME  = 2000;
const RESET_FADE = 400;

function showNext() {
  if (current >= sequence.length) { setTimeout(reset, HOLD_TIME); return; }
  const item = sequence[current];
  if (item.type === 'step') {
    circleEls[item.idx].classList.add('visible', 'active');
    labelEls[item.idx].classList.add('visible');
    setTimeout(() => badgeEls[item.idx].classList.add('active'), 200);
    setTimeout(() => circleEls[item.idx].classList.remove('active'), 900);
  } else {
    lineEls[item.idx].classList.add('visible');
  }
  current++;
  setTimeout(showNext, STEP_DELAY);
}

function reset() {
  const wrapper = document.querySelector('.wrapper');
  wrapper.style.transition = `opacity ${RESET_FADE}ms ease`;
  wrapper.style.opacity = '0';
  setTimeout(() => {
    circleEls.forEach(e => e.classList.remove('visible', 'active'));
    labelEls.forEach(e => e.classList.remove('visible'));
    badgeEls.forEach(e => e.classList.remove('active'));
    lineEls.forEach(e => e.classList.remove('visible'));
    current = 0;
    wrapper.style.opacity = '1';
    setTimeout(showNext, 300);
  }, RESET_FADE);
}

showNext();
</script>
</body>
</html>
