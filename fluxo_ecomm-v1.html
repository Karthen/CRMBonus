<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxo PDV</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .container {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 3rem 2rem;
  }
  .step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .step.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #F5A623;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 18px rgba(245,166,35,0.38);
  }
  .circle svg {
    width: 32px;
    height: 32px;
  }
  .label {
    font-size: 12px;
    font-weight: 600;
    color: #2c2c2a;
    font-family: 'Courier New', monospace;
    white-space: nowrap;
  }
  .connector {
    display: flex;
    align-items: center;
    margin-bottom: 28px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .connector.visible { opacity: 1; }
  .line {
    height: 3px;
    width: 44px;
    background: linear-gradient(90deg, #c8860a, #8B5E00);
    position: relative;
  }
  .line.arrow::after {
    content: '';
    position: absolute;
    right: -1px;
    top: 50%;
    transform: translateY(-50%);
    border-left: 9px solid #8B5E00;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
  }
</style>
</head>
<body>
<div class="container" id="flow"></div>

<script>
const steps = [
  {
    label: '/enviar_pin',
    icon: `<svg viewBox="0 0 24 24" fill="white"><polygon points="6,3 20,12 6,21"/></svg>`
  },
  {
    label: '/validar_pin',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4,12 9,17 20,6"/></svg>`
  },
  {
    label: '/consulta_bonus',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="9" r="4"/>
      <path d="M6 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
      <text x="12" y="11" text-anchor="middle" font-size="7" fill="white" stroke="none" font-weight="bold" font-family="sans-serif">$</text>
    </svg>`
  },
  {
    label: '/baixa_bonus',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="11" width="14" height="10" rx="2"/>
      <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
    </svg>`
  },
  {
    label: '/finaliza_compra',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="21" r="1.5"/>
      <circle cx="19" cy="21" r="1.5"/>
      <path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/>
    </svg>`
  }
];

const flow = document.getElementById('flow');
const elements = [];

steps.forEach((s, i) => {
  const stepEl = document.createElement('div');
  stepEl.className = 'step';
  stepEl.innerHTML = `<div class="circle">${s.icon}</div><span class="label">${s.label}</span>`;
  flow.appendChild(stepEl);
  elements.push({ el: stepEl, type: 'step' });

  if (i < steps.length - 1) {
    const connEl = document.createElement('div');
    connEl.className = 'connector';
    const isLast = i === steps.length - 2;
    connEl.innerHTML = `<div class="line${isLast ? ' arrow' : ''}"></div>`;
    flow.appendChild(connEl);
    elements.push({ el: connEl, type: 'connector' });
  }
});

let current = 0;
const STEP_DELAY = 600;
const HOLD_TIME  = 1800;
const RESET_FADE = 400;

function showNext() {
  if (current >= elements.length) {
    setTimeout(reset, HOLD_TIME);
    return;
  }
  elements[current].el.classList.add('visible');
  current++;
  setTimeout(showNext, STEP_DELAY);
}

function reset() {
  flow.style.transition = `opacity ${RESET_FADE}ms ease`;
  flow.style.opacity = '0';
  setTimeout(() => {
    elements.forEach(e => e.el.classList.remove('visible'));
    current = 0;
    flow.style.opacity = '1';
    setTimeout(showNext, 300);
  }, RESET_FADE);
}

showNext();
</script>
</body>
</html>
