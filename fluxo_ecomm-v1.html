<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxo PDV V1</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow: hidden; background: var(--bg); font-family: 'Inter', sans-serif; }
  body { display: flex; align-items: center; justify-content: center; }

  :root {
    --bg: #ffffff;
    --text: #2c2c2a;
    --badge-bg: #E1F5EE;
    --badge-text: #0F6E56;
    --badge-border: #0F6E56;
    --badge-shadow: 0 1px 4px rgba(15,110,86,0.25);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b0c0e;
      --text: #e8e6dc;
      --badge-bg: #083320;
      --badge-text: #5DCAA5;
      --badge-border: #0F6E56;
      --badge-shadow: 0 1px 4px rgba(93,202,165,0.2);
    }
  }

  .wrapper { width: 100%; padding: 1.25rem 1rem 1rem; }
  .flow { display: flex; align-items: center; justify-content: center; width: 100%; }

  .slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(4px, 1vw, 8px);
    flex-shrink: 0;
  }

  .circle {
    width: clamp(36px, 7vw, 60px);
    height: clamp(36px, 7vw, 60px);
    border-radius: 50%;
    background: #F5A623;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 12px rgba(245,166,35,0.35);
    flex-shrink: 0;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.35s ease, transform 0.35s ease, box-shadow 0.35s ease;
  }
  .circle.visible { opacity: 1; transform: translateY(0); }
  .circle.active  { box-shadow: 0 0 0 3px rgba(245,166,35,0.4), 0 3px 16px rgba(245,166,35,0.5); }
  .circle svg { width: clamp(14px, 3vw, 24px); height: clamp(14px, 3vw, 24px); }

  .label {
    font-size: clamp(8px, 1.1vw, 11px);
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.35s ease;
    text-align: center;
  }
  .label.visible { opacity: 1; }

  .badge {
    font-size: clamp(8px, 1vw, 10px);
    font-weight: 500;
    color: var(--badge-text);
    background: var(--badge-bg);
    border: 1px solid var(--badge-border);
    box-shadow: var(--badge-shadow);
    border-radius: 20px;
    padding: clamp(2px, 0.3vw, 3px) clamp(6px, 1vw, 10px);
    white-space: nowrap;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .badge.active { opacity: 1; transform: translateY(0); }

  .connector {
    flex: 1;
    min-width: clamp(8px, 2vw, 20px);
    height: 3px;
    margin-bottom: clamp(32px, 5.5vw, 52px);
    position: relative;
    background: transparent;
  }
  .connector::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, #c8860a, #8B5E00);
    transform: scaleX(0);
    transform-origin: left center;
    transition: transform 0.4s ease;
  }
  .connector.visible::before { transform: scaleX(1); }
  .connector.arrow::after {
    content: '';
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%) scaleX(0);
    transform-origin: left center;
    border-left: 7px solid #8B5E00;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
    transition: transform 0.2s ease 0.35s;
  }
  .connector.arrow.visible::after { transform: translateY(-50%) scaleX(1); }
</style>
</head>
<body>
<div class="wrapper">
  <div class="flow" id="flow"></div>
</div>
<script>
const steps = [
  { label: '/enviar_pin',    desc: 'PIN enviado',
    icon: `<svg viewBox="0 0 24 24" fill="white"><polygon points="6,3 20,12 6,21"/></svg>` },
  { label: '/validar_pin',   desc: 'PIN válido',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4,12 9,17 20,6"/></svg>` },
  { label: '/consulta_bonus', desc: 'Saldo disponível',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-3.3 3.6-6 8-6s8 2.7 8 6"/></svg>` },
  { label: '/baixa_bonus',   desc: 'Reserva o bônus',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>` },
  { label: '/finaliza_compra', desc: 'Bônus gerado/resgatado',
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1.5"/><circle cx="19" cy="21" r="1.5"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>` },
];

const flow = document.getElementById('flow');
const circleEls = [], labelEls = [], badgeEls = [], connEls = [];

steps.forEach((s, i) => {
  const slot = document.createElement('div');
  slot.className = 'slot';
  const circ = document.createElement('div');
  circ.className = 'circle';
  circ.innerHTML = s.icon;
  const lbl = document.createElement('div');
  lbl.className = 'label';
  lbl.textContent = s.label;
  const badge = document.createElement('div');
  badge.className = 'badge';
  badge.textContent = s.desc;
  slot.append(circ, lbl, badge);
  flow.appendChild(slot);
  circleEls.push(circ);
  labelEls.push(lbl);
  badgeEls.push(badge);
  if (i < steps.length - 1) {
    const conn = document.createElement('div');
    conn.className = i === steps.length - 2 ? 'connector arrow' : 'connector';
    flow.appendChild(conn);
    connEls.push(conn);
  }
});

const sequence = [];
steps.forEach((_, i) => {
  sequence.push({ type: 'step', idx: i });
  if (i < steps.length - 1) sequence.push({ type: 'line', idx: i });
});

let current = 0;
const STEP_DELAY = 650, HOLD_TIME = 2000, RESET_FADE = 400;

function showNext() {
  if (current >= sequence.length) { setTimeout(reset, HOLD_TIME); return; }
  const item = sequence[current++];
  if (item.type === 'step') {
    circleEls[item.idx].classList.add('visible', 'active');
    labelEls[item.idx].classList.add('visible');
    setTimeout(() => badgeEls[item.idx].classList.add('active'), 200);
    setTimeout(() => circleEls[item.idx].classList.remove('active'), 900);
  } else {
    connEls[item.idx].classList.add('visible');
  }
  setTimeout(showNext, STEP_DELAY);
}

function reset() {
  const wrapper = document.querySelector('.wrapper');
  wrapper.style.transition = `opacity ${RESET_FADE}ms ease`;
  wrapper.style.opacity = '0';
  setTimeout(() => {
    circleEls.forEach(e => e.classList.remove('visible', 'active'));
    labelEls.forEach(e => e.classList.remove('visible'));
    badgeEls.forEach(e => e.classList.remove('active'));
    connEls.forEach(e => e.classList.remove('visible'));
    current = 0;
    wrapper.style.opacity = '1';
    setTimeout(showNext, 300);
  }, RESET_FADE);
}

showNext();
</script>
</body>
</html>
